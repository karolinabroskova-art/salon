<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Mindsalon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      background: #191926;
      color: #faf8f3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .ornament {
      width: 60px;
      height: 1px;
      background: #b8936a;
      margin: 0 auto 2.5rem;
      opacity: 0.5;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 300;
      color: #faf8f3;
      margin-bottom: 1rem;
    }
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      font-style: italic;
      color: #d4b896;
      margin-bottom: 2rem;
    }
    p {
      font-size: 0.85rem;
      color: rgba(250,248,243,0.5);
      max-width: 420px;
      line-height: 1.85;
      margin-bottom: 3rem;
    }
    a {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #b8936a;
      text-decoration: none;
      border: 1px solid rgba(184,147,106,0.4);
      padding: 0.85rem 2rem;
      transition: all 0.3s ease;
    }
    a:hover { background: #b8936a; color: #191926; }
  </style>
</head>
<body>
  <div class="ornament"></div>
  <h1>Thank you.</h1>
  <p class="tagline">Your note has arrived.</p>
  <p>
    Karolina reads every message personally and will be in touch within a few days.
    In the meantime, feel free to explore the salon and what it offers.
  </p>
  <a href="index.html">Return to Mindsalon</a>
</body>
</html>
