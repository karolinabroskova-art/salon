<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindsalon — Instagram Logo Preview</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap');

    :root {
      --ivory:      #faf8f3;
      --night:      #191926;
      --gold:       #b8936a;
      --gold-light: #d4b896;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #2a2a2a;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      gap: 60px;
    }

    .section-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #888;
      text-align: center;
      margin-bottom: 32px;
    }

    .row {
      display: flex;
      align-items: flex-end;
      gap: 60px;
      justify-content: center;
    }

    .logo-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .size-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #666;
    }

    .ig-logo {
      border-radius: 50%;
      background: var(--night);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      /* subtle gold ring */
      box-shadow: 0 0 0 2px rgba(184,147,106,0.55);
    }

    .option-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #aaa;
      text-align: center;
      margin-bottom: 20px;
    }

    .option-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Simulate Instagram's feed thumbnail size with surrounding context */
    .ig-feed-sim {
      background: #1a1a1a;
      border-radius: 4px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ig-feed-sim .feed-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ig-feed-sim .feed-name {
      font-size: 0.65rem;
      font-weight: 600;
      color: #faf8f3;
      letter-spacing: 0.04em;
    }
    .ig-feed-sim .feed-handle {
      font-size: 0.58rem;
      color: #888;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

  <div class="option-block">
    <div class="option-title">Mark · Dark + Subtle Gold Ring — at all displayed sizes</div>
    <div class="row">

      <!-- 320px upload size -->
      <div class="logo-wrapper">
        <div class="ig-logo" style="width:320px;height:320px;box-shadow:0 0 0 5px rgba(184,147,106,0.50);">
          <svg viewBox="0 0 46 46" width="190" height="190">
            <circle cx="23" cy="23" r="21" fill="none" stroke="#b8936a" stroke-width="0.85"/>
            <circle cx="23" cy="23" r="12" fill="none" stroke="#b8936a" stroke-width="0.85"/>
            <line x1="23" y1="2"  x2="23" y2="11" stroke="#b8936a" stroke-width="0.85"/>
            <line x1="23" y1="35" x2="23" y2="44" stroke="#b8936a" stroke-width="0.85"/>
            <circle cx="23" cy="23" r="2" fill="#b8936a"/>
          </svg>
        </div>
        <div class="size-label">320px · upload</div>
      </div>

      <!-- 150px desktop profile -->
      <div class="logo-wrapper">
        <div class="ig-logo" style="width:150px;height:150px;box-shadow:0 0 0 2.5px rgba(184,147,106,0.50);">
          <svg viewBox="0 0 46 46" width="88" height="88">
            <circle cx="23" cy="23" r="21" fill="none" stroke="#b8936a" stroke-width="1.1"/>
            <circle cx="23" cy="23" r="12" fill="none" stroke="#b8936a" stroke-width="1.1"/>
            <line x1="23" y1="2"  x2="23" y2="11" stroke="#b8936a" stroke-width="1.1"/>
            <line x1="23" y1="35" x2="23" y2="44" stroke="#b8936a" stroke-width="1.1"/>
            <circle cx="23" cy="23" r="2.2" fill="#b8936a"/>
          </svg>
        </div>
        <div class="size-label">150px · desktop profile</div>
      </div>

      <!-- 110px mobile -->
      <div class="logo-wrapper">
        <div class="ig-logo" style="width:110px;height:110px;box-shadow:0 0 0 2px rgba(184,147,106,0.50);">
          <svg viewBox="0 0 46 46" width="64" height="64">
            <circle cx="23" cy="23" r="21" fill="none" stroke="#b8936a" stroke-width="1.3"/>
            <circle cx="23" cy="23" r="12" fill="none" stroke="#b8936a" stroke-width="1.3"/>
            <line x1="23" y1="2"  x2="23" y2="11" stroke="#b8936a" stroke-width="1.3"/>
            <line x1="23" y1="35" x2="23" y2="44" stroke="#b8936a" stroke-width="1.3"/>
            <circle cx="23" cy="23" r="2.5" fill="#b8936a"/>
          </svg>
        </div>
        <div class="size-label">110px · mobile</div>
      </div>

      <!-- 32px stories/comments thumbnail -->
      <div class="logo-wrapper">
        <div class="ig-logo" style="width:42px;height:42px;box-shadow:0 0 0 1px rgba(184,147,106,0.55);">
          <svg viewBox="0 0 46 46" width="26" height="26">
            <circle cx="23" cy="23" r="21" fill="none" stroke="#b8936a" stroke-width="1.6"/>
            <circle cx="23" cy="23" r="12" fill="none" stroke="#b8936a" stroke-width="1.6"/>
            <line x1="23" y1="2"  x2="23" y2="11" stroke="#b8936a" stroke-width="1.6"/>
            <line x1="23" y1="35" x2="23" y2="44" stroke="#b8936a" stroke-width="1.6"/>
            <circle cx="23" cy="23" r="3" fill="#b8936a"/>
          </svg>
        </div>
        <div class="size-label">42px · comments</div>
      </div>

    </div>
  </div>

  <!-- Instagram feed simulation -->
  <div class="option-block" style="margin-top:10px;">
    <div class="option-title">How it appears in the Instagram feed</div>
    <div class="ig-feed-sim">
      <div class="ig-logo" style="width:42px;height:42px;box-shadow:0 0 0 1px rgba(184,147,106,0.55);">
        <svg viewBox="0 0 46 46" width="26" height="26">
          <circle cx="23" cy="23" r="21" fill="none" stroke="#b8936a" stroke-width="1.6"/>
          <circle cx="23" cy="23" r="12" fill="none" stroke="#b8936a" stroke-width="1.6"/>
          <line x1="23" y1="2"  x2="23" y2="11" stroke="#b8936a" stroke-width="1.6"/>
          <line x1="23" y1="35" x2="23" y2="44" stroke="#b8936a" stroke-width="1.6"/>
          <circle cx="23" cy="23" r="3" fill="#b8936a"/>
        </svg>
      </div>
      <div class="feed-text">
        <div class="feed-name">mindsalon</div>
        <div class="feed-handle">mindsalon · Madrid</div>
      </div>
    </div>
  </div>

</body>
</html>
